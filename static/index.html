<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mdserver</title>

<link id="hljs-theme" rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
/* ── Evident language definition for highlight.js ─────────────────────── */
(function () {
  'use strict';

  /** @param {import('highlight.js').HLJSApi} hljs */
  function evident(hljs) {

    const COMMENT = {
      scope: 'comment',
      begin: /--/,
      end: /$/,
      relevance: 0,
    };

    const STRING = {
      scope: 'string',
      begin: /"/,
      end: /"/,
      contains: [{ begin: /\\./ }],
      relevance: 0,
    };

    const NUMBER = {
      scope: 'number',
      match: /\b\d+(\.\d+)?\b/,
      relevance: 0,
    };

    // `type` declaration keyword → purple
    const TYPE_DECL_KW = {
      scope: 'type',
      match: /\btype\b/,
    };

    // Core keywords → blue / keyword colour
    const KEYWORDS = {
      scope: 'keyword',
      match: /\b(schema|claim|evident|assert|when|otherwise|with|as|then|else|find|all|some|one|none|minimizing|where|not|and|or|true|false)\b/,
    };

    // Fix #1: After `claim` or `evident`, highlight the next word as a function name.
    // This mode starts on the keyword, then captures the following identifier.
    const CLAIM_NAME = {
      begin: /\b(claim|evident)\s+/,
      beginScope: 'keyword',
      end: /[a-z_][A-Za-z0-9_]*/,
      endScope: 'title.function',
      relevance: 2,
    };

    // => and ⇒ implication arrows → bold operator
    const IMPLICATION = {
      scope: 'operator',
      match: /=>|⇒/,
      relevance: 2,
    };

    // Unicode quantifiers and negation → keyword colour (indigo)
    // Order matters: ∃! and ¬∃ must come before ∃ and ¬ respectively.
    const UNICODE_QUANTIFIER = {
      scope: 'keyword',
      match: /∃!|¬∃|∀|∃|¬/,
      relevance: 2,
    };

    // Unicode membership and relational operators → operator colour
    const UNICODE_MEMBERSHIP = {
      scope: 'operator',
      match: /∈|∉|⊆|⊇|∨|∧|≤|≥|≠|×|·/,
      relevance: 1,
    };

    // Punctuation operators (includes | explicitly; \.\. for range/passthrough; \\ for set diff)
    const OPERATOR = {
      scope: 'operator',
      match: /->|<=|>=|!=|\.\.|[|:=+\-*<>\\]/,
      relevance: 0,
    };

    // Word operators: in, not_in, subset, superset, mapsto, bowtie, starts_with
    const WORD_OPERATOR = {
      scope: 'operator',
      match: /\b(in|not_in|subset|superset|mapsto|bowtie|starts_with)\b/,
    };

    // Top-level predicate names: lowercase identifier at the very start of a line
    // (no leading whitespace). This catches head predicates in top-level implication
    // rules such as:  node n ⇒ reachable n n
    // Placed after all keyword/claim rules so those take priority.
    const TOP_LEVEL_PREDICATE = {
      scope: 'title.function',
      match: /^[a-z_][A-Za-z0-9_]*/,
      relevance: 0,
    };

    // Type-level built-ins → teal/cyan
    const TYPE_KEYWORDS = {
      scope: 'built_in',
      match: /\b(Prop|det|semidet|nondet|Nat|Int|Real|Bool|String|List|Maybe|Set|Type|Arrow|ForAll)\b/,
    };

    // Any other CapitalisedIdentifier → teal (type constructor)
    const CAPITALIZED = {
      scope: 'built_in',
      match: /\b[A-Z][A-Za-z0-9_]*\b/,
      relevance: 0,
    };

    // Fix #3: Replaced TYPE_PARAM_BRACKET (which swallowed list literals) with
    // simple bracket punctuation. Contents are handled by existing rules.
    const BRACKET = {
      scope: 'punctuation',
      match: /[\[\]]/,
      relevance: 0,
    };

    // Fix #6: `?identifier` as a single variable token (output variable).
    // Must come before standalone QUERY_OP so it takes priority.
    const QUERY_VAR = {
      scope: 'variable',
      match: /\?[A-Za-z_][A-Za-z0-9_]*/,
      relevance: 2,
    };

    // Fix #6: Standalone `?` (query line opener, e.g. `? sort [3, 1, 2]`)
    const QUERY_OP = {
      scope: 'selector-tag',
      match: /\?/,
      relevance: 2,
    };

    // { } record / block delimiters
    const BRACE = {
      scope: 'punctuation',
      match: /[{}]/,
      relevance: 0,
    };

    // Fix #5: Record field names — lowercase identifier immediately before `:` or `=`
    // Covers both type annotations (id : Nat) and record literals (id = 1).
    const FIELD_NAME = {
      scope: 'attr',
      match: /\b[a-z_][A-Za-z0-9_]*(?=\s*[:=])/,
      relevance: 0,
    };

    // Fix #7: Field access — identifier after a dot (e.g. req.method → method)
    const FIELD_ACCESS = {
      scope: 'attr',
      match: /(?<=\.)[a-z_][A-Za-z0-9_]*/,
      relevance: 0,
    };

    // Fix #2: Sub-claim predicate names — lowercase identifier at the start of
    // an indented line (body lines in claim/evident blocks).
    // Pattern: start-of-line, optional whitespace, then a lowercase identifier
    // not followed by `(` (to avoid matching function-call syntax in other langs).
    const BODY_PREDICATE = {
      scope: 'title.function',
      match: /^[ \t]+[a-z_][A-Za-z0-9_]*/,
      relevance: 0,
    };

    return {
      name: 'Evident',
      aliases: ['ev'],
      case_insensitive: false,
      contains: [
        COMMENT,
        STRING,
        CLAIM_NAME,          // must be before KEYWORDS so it captures the keyword+name pair
        QUERY_VAR,           // must be before QUERY_OP
        QUERY_OP,
        IMPLICATION,         // => and ⇒ — before OPERATOR so they don't get split
        UNICODE_QUANTIFIER,  // ∀ ∃ ∃! ¬ ¬∃ — before UNICODE_MEMBERSHIP
        UNICODE_MEMBERSHIP,  // ∈ ∉
        TYPE_DECL_KW,
        KEYWORDS,
        TYPE_KEYWORDS,
        CAPITALIZED,
        BRACKET,             // replaces TYPE_PARAM_BRACKET
        WORD_OPERATOR,
        OPERATOR,
        NUMBER,
        BRACE,
        FIELD_ACCESS,        // before FIELD_NAME so dot-access takes priority
        FIELD_NAME,
        BODY_PREDICATE,
        TOP_LEVEL_PREDICATE, // after BODY_PREDICATE; catches col-0 predicate names
      ],
    };
  }

  hljs.registerLanguage('evident', evident);
})();
</script>
<script>
/* ── SMT-LIB language support (SMT-LIB 2.6) ───────────────────────────── */
(function () {
  'use strict';

  // Shared word lists, reused by the highlight.js definition (rendered view)
  // and the CodeMirror stream parser (editor). Based on the SMT-LIB 2.6 standard.
  const WORDS = {
    // Top-level script commands
    commands: [
      'assert', 'check-sat', 'check-sat-assuming', 'declare-const', 'declare-datatype',
      'declare-datatypes', 'declare-fun', 'declare-sort', 'define-fun', 'define-fun-rec',
      'define-funs-rec', 'define-sort', 'echo', 'exit', 'get-assertions', 'get-assignment',
      'get-info', 'get-model', 'get-option', 'get-proof', 'get-unsat-assumptions',
      'get-unsat-core', 'get-value', 'pop', 'push', 'reset', 'reset-assertions',
      'set-info', 'set-logic', 'set-option',
    ],
    // Binders and reserved words of the term language
    binders: ['let', 'forall', 'exists', 'match', 'par', 'as', '!', '_'],
    // Core logical connectives (highlighted like keywords)
    logical: ['and', 'or', 'not', 'xor', '=>', '=', 'distinct', 'ite'],
    // Theory function symbols (Core, Ints/Reals, Arrays, BitVectors, Strings,
    // RegEx, FloatingPoint). Not exhaustive, but covers the standard theories.
    builtins: [
      // arithmetic / comparison
      '+', '-', '*', '/', 'div', 'mod', 'rem', 'abs', '^', '<', '<=', '>', '>=',
      'to_real', 'to_int', 'is_int', 'divisible',
      // arrays
      'select', 'store',
      // bit-vectors
      'concat', 'extract', 'bvnot', 'bvand', 'bvor', 'bvnand', 'bvnor', 'bvxor',
      'bvxnor', 'bvneg', 'bvadd', 'bvsub', 'bvmul', 'bvudiv', 'bvurem', 'bvsdiv',
      'bvsrem', 'bvsmod', 'bvshl', 'bvlshr', 'bvashr', 'bvult', 'bvule', 'bvugt',
      'bvuge', 'bvslt', 'bvsle', 'bvsgt', 'bvsge', 'bvcomp', 'repeat', 'zero_extend',
      'sign_extend', 'rotate_left', 'rotate_right', 'bv2nat', 'nat2bv',
      // strings
      'str.++', 'str.len', 'str.at', 'str.substr', 'str.prefixof', 'str.suffixof',
      'str.contains', 'str.indexof', 'str.replace', 'str.replace_all', 'str.to_int',
      'str.from_int', 'str.to_code', 'str.from_code', 'str.to_re', 'str.in_re',
      'str.<', 'str.<=', 'str.is_digit',
      // regular expressions
      're.none', 're.all', 're.allchar', 're.++', 're.union', 're.inter', 're.*',
      're.+', 're.opt', 're.range', 're.comp', 're.diff', 're.loop',
      // floating point
      'fp', 'fp.abs', 'fp.neg', 'fp.add', 'fp.sub', 'fp.mul', 'fp.div', 'fp.fma',
      'fp.sqrt', 'fp.rem', 'fp.roundToIntegral', 'fp.min', 'fp.max', 'fp.leq',
      'fp.lt', 'fp.geq', 'fp.gt', 'fp.eq', 'fp.isNormal', 'fp.isSubnormal',
      'fp.isZero', 'fp.isInfinite', 'fp.isNaN', 'fp.isNegative', 'fp.isPositive',
      'fp.to_real', 'fp.to_sbv', 'fp.to_ubv',
    ],
    // Sort (type) names
    sorts: [
      'Bool', 'Int', 'Real', 'BitVec', 'Array', 'String', 'RegLan', 'RoundingMode',
      'FloatingPoint', 'Float16', 'Float32', 'Float64', 'Float128', 'Set', 'Seq', 'Bag',
    ],
    // Literal constants
    literals: [
      'true', 'false', 'roundNearestTiesToEven', 'roundNearestTiesToAway',
      'roundTowardPositive', 'roundTowardNegative', 'roundTowardZero',
      'RNE', 'RNA', 'RTP', 'RTN', 'RTZ',
    ],
  };
  window.SMT_WORDS = WORDS;

  /** @param {import('highlight.js').HLJSApi} hljs */
  function smt(hljs) {
    const COMMENT = { scope: 'comment', begin: /;/, end: /$/, relevance: 0 };

    // String literal — the only escape is "" (a doubled quote).
    const STRING = {
      scope: 'string',
      begin: /"/, end: /"/,
      contains: [{ begin: /""/ }],
      relevance: 0,
    };

    // |quoted symbol| — may span lines; contains anything but | and \
    const QUOTED_SYMBOL = { scope: 'symbol', begin: /\|/, end: /\|/, relevance: 0 };

    // :attribute keywords (e.g. :named, :pattern, :status)
    const ATTRIBUTE = {
      scope: 'symbol',
      match: /:[A-Za-z0-9+\-*/=%?!.$_~&^<>@]+/,
      relevance: 0,
    };

    // Numerals, decimals, hexadecimal (#x..) and binary (#b..) literals
    const NUMBER = {
      scope: 'number',
      match: /#x[0-9a-fA-F]+|#b[01]+|\b\d+(?:\.\d+)?\b/,
      relevance: 0,
    };

    return {
      name: 'SMT-LIB',
      aliases: ['smt', 'smt2', 'smtlib'],
      case_insensitive: false,
      keywords: {
        // An SMT-LIB "simple symbol": letters, digits and a set of punctuation,
        // not starting with a digit. Used to tokenise candidate keywords.
        $pattern: /[A-Za-z0-9+\-*/=%?!.$_~&^<>@]+/,
        keyword: WORDS.commands.concat(WORDS.binders, WORDS.logical).join(' '),
        built_in: WORDS.builtins.join(' '),
        type: WORDS.sorts.join(' '),
        literal: WORDS.literals.join(' '),
      },
      contains: [COMMENT, STRING, QUOTED_SYMBOL, ATTRIBUTE, NUMBER],
    };
  }

  if (typeof hljs !== 'undefined') hljs.registerLanguage('smt', smt);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.0/dist/mermaid.min.js"></script>


<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --fg: #1a1a1a;
  --sidebar-bg: #f7f7f7;
  --border: #e0e0e0;
  --toolbar-bg: #fafafa;
  --active-bg: #dbeafe;
  --active-fg: #1d4ed8;
  --hover-bg: #f0f0f0;
  --btn-bg: #e8e8e8;
  --btn-fg: #333;
  --btn-hover: #d0d0d0;
  --search-result-bg: #f9f9f9;
  --scrollbar: #ccc;
  --link: #1d4ed8;
  --code-bg: #f6f8fa;
  --blockquote-border: #d0d0d0;
  --blockquote-fg: #666;
}

[data-theme="dark"] {
  --bg: #1e1e1e;
  --fg: #d4d4d4;
  --sidebar-bg: #252526;
  --border: #3e3e3e;
  --toolbar-bg: #2d2d2d;
  --active-bg: #1e3a5f;
  --active-fg: #93c5fd;
  --hover-bg: #2a2a2a;
  --btn-bg: #3a3a3a;
  --btn-fg: #d4d4d4;
  --btn-hover: #4a4a4a;
  --search-result-bg: #2a2a2a;
  --scrollbar: #555;
  --link: #93c5fd;
  --code-bg: #2d2d2d;
  --blockquote-border: #555;
  --blockquote-fg: #999;
}

html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────── */
#sidebar {
  width: 260px;
  min-width: 140px;
  max-width: 640px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

/* Drag handle to resize the sidebar by its right edge. */
#sidebar-resizer {
  width: 5px;
  flex-shrink: 0;
  cursor: col-resize;
  background: transparent;
  transition: background 0.12s;
}
#sidebar-resizer:hover, #sidebar-resizer.dragging { background: var(--link); }

#search-box {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#search-input {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--fg);
  font-size: 13px;
  outline: none;
}
#search-input:focus { border-color: var(--link); }

#search-results {
  margin-top: 6px;
  max-height: 280px;
  overflow-y: auto;
}

.search-result {
  padding: 4px 6px;
  cursor: pointer;
  border-radius: 3px;
  border-bottom: 1px solid var(--border);
}
.search-result:hover { background: var(--hover-bg); }
.sr-file { display: block; font-size: 11px; color: var(--link); font-weight: 500; }
.sr-snippet { display: block; font-size: 12px; color: var(--blockquote-fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.tree-item {
  display: flex;
  align-items: center;
  padding: 3px 8px;
  cursor: pointer;
  user-select: none;
  border-radius: 3px;
  margin: 1px 4px;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-item:hover { background: var(--hover-bg); }
.tree-item.active { background: var(--active-bg); color: var(--active-fg); }

.tree-file::before { content: '📄 '; font-size: 11px; margin-right: 3px; }
.tree-dir-label { display: flex; align-items: center; padding: 3px 8px; cursor: pointer; user-select: none; border-radius: 3px; margin: 1px 4px; font-size: 13px; font-weight: 500; }
.tree-dir-label:hover { background: var(--hover-bg); }
.tree-dir-label::before { content: '▶'; font-size: 9px; margin-right: 6px; transition: transform 0.15s; display: inline-block; }
.tree-dir-label.open::before { transform: rotate(90deg); }
.tree-dir-children { display: none; padding-left: 14px; }
.tree-dir-children.open { display: block; }

/* ── Content area ──────────────────────────────────────── */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  min-width: 0;
}

#toolbar {
  display: flex;
  align-items: center;
  padding: 6px 12px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
  min-height: 38px;
}

#current-file-name {
  flex: 1;
  font-size: 13px;
  color: var(--blockquote-fg);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.toolbar-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--btn-bg);
  color: var(--btn-fg);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.toolbar-btn:hover { background: var(--btn-hover); }

#render-panel {
  flex: 1;
  overflow-y: auto;
  padding: 2rem 2.5rem;
  line-height: 1.7;
  position: relative; /* containing block for print-page ticks */
}

/* Limit prose width for readability. File content is wrapped in .doc so the
   whole document centers as a block; per-element margins (which set left/right
   to 0 and would otherwise defeat the auto-margins here) then only affect
   spacing within that centered column. */
#render-panel > * { max-width: 860px; margin-left: auto; margin-right: auto; }
#render-panel .doc { max-width: 860px; margin: 0 auto; }
#render-panel.full-width > *,
#render-panel.full-width .doc { max-width: none; }

/* Estimated print-page boundary ticks down the right edge of a document. */
.page-tick {
  position: absolute;
  right: 0;
  width: 22px;
  max-width: none !important;   /* override the prose-width rule above */
  margin: 0 !important;
  border-top: 1px solid var(--border);
  pointer-events: none;
  user-select: none;
}
.page-tick::after {
  content: attr(data-label);
  position: absolute;
  right: 2px;
  top: 3px;
  font-size: 9px;
  line-height: 1;
  color: var(--blockquote-fg);
  opacity: 0.7;
  font-variant-numeric: tabular-nums;
}

/* ── Markdown prose styles ─────────────────────────────── */
#render-panel h1, #render-panel h2, #render-panel h3,
#render-panel h4, #render-panel h5, #render-panel h6 {
  margin: 1.4em 0 0.5em;
  line-height: 1.3;
  font-weight: 600;
}
#render-panel h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
#render-panel h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
#render-panel h3 { font-size: 1.2em; }
#render-panel p { margin: 0.75em 0; }
#render-panel a { color: var(--link); text-decoration: none; }
#render-panel a:hover { text-decoration: underline; }
#render-panel ul, #render-panel ol { margin: 0.5em 0 0.5em 1.5em; }
#render-panel li { margin: 0.25em 0; }
#render-panel blockquote {
  margin: 1em 0;
  padding: 0.5em 1em;
  border-left: 4px solid var(--blockquote-border);
  color: var(--blockquote-fg);
  background: var(--code-bg);
  border-radius: 0 4px 4px 0;
}
#render-panel table { border-collapse: collapse; width: 100%; margin: 1em 0; }
#render-panel th, #render-panel td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
#render-panel th { background: var(--code-bg); font-weight: 600; }
#render-panel tr:nth-child(even) { background: var(--sidebar-bg); }
#render-panel img { max-width: 100%; border-radius: 4px; }
#render-panel hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

#render-panel pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1em;
  overflow-x: auto;
  margin: 0.75em 0;
}
#render-panel code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 0.875em;
  background: var(--code-bg);
  padding: 0.15em 0.35em;
  border-radius: 3px;
}
#render-panel pre code {
  background: none;
  padding: 0;
  font-size: 0.875em;
}

/* Mermaid diagrams */
#render-panel .mermaid {
  display: flex;
  justify-content: center;
  margin: 1em 0;
}
#render-panel .mermaid svg { max-width: 100%; }

/* Welcome screen */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--blockquote-fg);
  gap: 12px;
}
#welcome h2 { font-size: 1.4em; font-weight: 400; }
#welcome p { font-size: 13px; }

/* ── Editor panel ──────────────────────────────────────── */
#editor-panel {
  display: none;
  flex: 1;
  overflow: hidden;
  flex-direction: column;
}

.cm-editor {
  height: 100%;
  font-size: 14px;
}
.cm-scroller { overflow: auto !important; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

/* hljs overrides for dark background */
[data-theme="dark"] .hljs { background: var(--code-bg); }

/* ── Evident language token colours ──────────────────────────────────── */

/* claim keyword: indigo */
.language-evident .hljs-keyword { color: #4f46e5; font-weight: 600; }
[data-theme="dark"] .language-evident .hljs-keyword { color: #818cf8; font-weight: 600; }

/* type declaration keyword: purple */
.language-evident .hljs-type { color: #7c3aed; }
[data-theme="dark"] .language-evident .hljs-type { color: #a78bfa; }

/* built-in type names / capitalized identifiers: teal/cyan */
.language-evident .hljs-built_in { color: #0891b2; }
[data-theme="dark"] .language-evident .hljs-built_in { color: #22d3ee; }

/* operators (including =>): bold blue-grey */
.language-evident .hljs-operator { color: #0369a1; font-weight: 600; }
[data-theme="dark"] .language-evident .hljs-operator { color: #38bdf8; font-weight: 600; }

/* ? query operator: green/teal (reuses selector-tag) */
.language-evident .hljs-selector-tag { color: #059669; font-weight: 700; }
[data-theme="dark"] .language-evident .hljs-selector-tag { color: #34d399; font-weight: 700; }

/* comments: italic grey */
.language-evident .hljs-comment { color: #6b7280; font-style: italic; }
[data-theme="dark"] .language-evident .hljs-comment { color: #9ca3af; font-style: italic; }

/* string literals: green */
.language-evident .hljs-string { color: #16a34a; }
[data-theme="dark"] .language-evident .hljs-string { color: #4ade80; }

/* numeric literals: orange */
.language-evident .hljs-number { color: #ea580c; }
[data-theme="dark"] .language-evident .hljs-number { color: #fb923c; }

/* punctuation brackets: muted fg */
.language-evident .hljs-punctuation { color: #374151; }
[data-theme="dark"] .language-evident .hljs-punctuation { color: #d1d5db; }

/* claim/evident names and sub-claim predicates: warm orange-brown */
.language-evident .hljs-title\.function { color: #b45309; font-weight: 600; }
[data-theme="dark"] .language-evident .hljs-title\.function { color: #fbbf24; font-weight: 600; }

/* ?result output variables: magenta/pink */
.language-evident .hljs-variable { color: #9d174d; font-weight: 600; }
[data-theme="dark"] .language-evident .hljs-variable { color: #f472b6; font-weight: 600; }

/* record field names and dot-access fields: slate blue */
.language-evident .hljs-attr { color: #1d4ed8; }
[data-theme="dark"] .language-evident .hljs-attr { color: #93c5fd; }

/* ── Mode tabs (Files / Sessions) ─────────────────────────── */
#mode-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.mode-tab {
  flex: 1;
  padding: 7px 8px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--blockquote-fg);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
.mode-tab:hover { background: var(--hover-bg); }
.mode-tab.active { color: var(--active-fg); border-bottom-color: var(--active-fg); }

/* ── Session list ─────────────────────────────────────────── */
/* min-height:0 lets this flex child actually scroll instead of growing the
   sidebar past the viewport. */
#session-list { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 0; display: none; }
.session-group { margin-bottom: 4px; }
.session-group-label {
  display: block;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--blockquote-fg);
  white-space: normal;        /* wrap long paths (broken at slashes via <wbr>) */
  overflow-wrap: anywhere;
  line-height: 1.35;
  position: sticky;
  top: 0;
  background: var(--sidebar-bg);
  z-index: 1;
}
.session-item {
  padding: 4px 10px 5px 16px;
  cursor: pointer;
  border-radius: 3px;
  margin: 1px 4px;
}
.session-item:hover { background: var(--hover-bg); }
.session-item.active { background: var(--active-bg); }
.session-title {
  display: block;
  font-size: 12px;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.session-item.active .session-title { color: var(--active-fg); }
.session-meta { display: block; font-size: 10px; color: var(--blockquote-fg); }

/* ── Transcript turns ─────────────────────────────────────── */
.turn { max-width: 860px; margin: 0 auto 4px; border-radius: 8px; }
#render-panel.full-width .turn { max-width: none; }
.turn-role {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--blockquote-fg);
  margin-bottom: 2px;
}
.turn-user {
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 10px 16px;
  margin-top: 18px;
}
.turn-user .turn-body { word-wrap: break-word; }
/* Collapse the top/bottom margins of the first/last markdown block inside a
   user box so the prose sits snug within its padding. */
.turn-user .turn-body > *:first-child { margin-top: 0; }
.turn-user .turn-body > *:last-child { margin-bottom: 0; }
.turn-assistant { padding: 4px 16px 12px; }

/* Compact one-line tool call: name+input left, result right, both ellipsized. */
.turn-tool {
  display: flex;
  gap: 14px;
  align-items: baseline;
  max-width: 860px;
  margin: 0 auto;
  padding: 1px 16px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--blockquote-fg);
}
#render-panel.full-width .turn-tool { max-width: none; }
.turn-tool .tool-call { flex: 1 1 58%; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.turn-tool .tool-result { flex: 1 1 42%; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; opacity: 0.7; }
.turn-tool .tool-name { color: var(--link); font-weight: 600; }
.turn-tool .tool-query { color: var(--fg); opacity: 0.8; }

.turn-sidechain { border-left: 3px solid var(--active-fg); }
.turn-sidechain .turn-role::after { content: ' · subagent'; font-weight: 400; text-transform: none; }

/* Compaction summaries are injected as "user" turns but aren't typed by a
   person — give them their own accent and label. */
.turn-compact { border-left: 3px solid #d97706; }
.turn-compact .turn-role { color: #d97706; }
[data-theme="dark"] .turn-compact { border-left-color: #fbbf24; }
[data-theme="dark"] .turn-compact .turn-role { color: #fbbf24; }
/* Keep prose width rules from applying twice inside turns */
#render-panel .turn > * { max-width: none; margin-left: 0; margin-right: 0; }
/* Windowed transcript spacers stand in for un-mounted pages so the scrollbar
   reflects the whole conversation. They must not be width-constrained. */
#turn-top-spacer, #turn-bottom-spacer { max-width: none !important; margin: 0 !important; }
.turn-page { max-width: none !important; margin: 0 !important; }

/* Toolbar session navigation */
#session-nav { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#sess-pos { font-size: 12px; color: var(--blockquote-fg); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* In-transcript find bar */
#session-find { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
#find-input {
  width: 180px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--fg);
  font-size: 12px;
  outline: none;
}
#find-input:focus { border-color: var(--link); }
#find-count { font-size: 11px; color: var(--blockquote-fg); white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 48px; }
#find-prev, #find-next { padding: 2px 8px; line-height: 1; }

/* Search matches inside transcript prose */
mark.search-hit { background: #fde68a; color: inherit; border-radius: 2px; padding: 0 1px; }
mark.search-hit-active { background: #f59e0b; box-shadow: 0 0 0 2px #f59e0b; }
[data-theme="dark"] mark.search-hit { background: #92560a; color: #fff; }
[data-theme="dark"] mark.search-hit-active { background: #d97706; box-shadow: 0 0 0 2px #d97706; }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="mode-tabs">
      <button class="mode-tab active" id="tab-files" data-mode="files">Files</button>
      <button class="mode-tab" id="tab-sessions" data-mode="sessions">Sessions</button>
    </div>
    <div id="search-box">
      <input id="search-input" type="text" placeholder="Search files..." autocomplete="off" spellcheck="false">
      <div id="search-results"></div>
    </div>
    <div id="file-tree"></div>
    <div id="session-list"></div>
  </aside>

  <div id="sidebar-resizer" title="Drag to resize sidebar"></div>

  <main id="content">
    <div id="toolbar">
      <span id="current-file-name"></span>
      <span id="session-find" style="display:none">
        <input id="find-input" type="text" placeholder="Find in transcript… (⌘F)" autocomplete="off" spellcheck="false">
        <span id="find-count"></span>
        <button class="toolbar-btn" id="find-prev" title="Previous match (Shift+Enter)">↑</button>
        <button class="toolbar-btn" id="find-next" title="Next match (Enter)">↓</button>
      </span>
      <span id="session-nav" style="display:none">
        <span id="sess-pos" title="Position in transcript"></span>
        <button class="toolbar-btn" id="sess-top" title="Jump to start (Home)">⏫ Start</button>
        <button class="toolbar-btn" id="sess-end" title="Jump to end (End)">End ⏬</button>
      </span>
      <button class="toolbar-btn" id="width-toggle" title="Toggle full width"
        onclick="(function(p){p.classList.toggle('full-width');localStorage.setItem('fullWidth',p.classList.contains('full-width')?'1':'0');})(document.getElementById('render-panel'))">↔</button>
      <button class="toolbar-btn" id="theme-toggle">Dark</button>
      <button class="toolbar-btn" id="edit-btn" style="display:none">Edit</button>
    </div>
    <div id="render-panel">
      <div id="welcome">
        <h2>mdserver</h2>
        <p>Select a file from the sidebar to view it.</p>
      </div>
    </div>
    <div id="editor-panel" tabindex="-1"></div>
  </main>
</div>

<script>
// ── CodeMirror — loaded on demand via dynamic import ─────
// esm.sh deduplicates shared peer deps so all packages share one @codemirror/state.
window._cmPromise = Promise.all([
  import('https://esm.sh/codemirror'),
  import('https://esm.sh/@codemirror/lang-markdown'),
  import('https://esm.sh/@codemirror/theme-one-dark'),
  import('https://esm.sh/@codemirror/language-data'),
  import('https://esm.sh/@codemirror/language'),
]).then(([cm, langMd, themeDark, langData, language]) => ({
  EditorView: cm.EditorView,
  basicSetup: cm.basicSetup,
  markdown: langMd.markdown,
  oneDark: themeDark.oneDark,
  languages: langData.languages,
  LanguageDescription: language.LanguageDescription,
  LanguageSupport: language.LanguageSupport,
  syntaxHighlighting: language.syntaxHighlighting,
  defaultHighlightStyle: language.defaultHighlightStyle,
  StreamLanguage: language.StreamLanguage,
}));

// ── Evident stream parser for CodeMirror ────────────────
// Token names must be @lezer/highlight tag property names (CM6 style).
// CM5 names like 'variable', 'def', 'builtin', 'type', 'property' create
// anonymous unstyled tags and produce no highlighting.
const _evidentParser = (() => {
  const KEYWORDS = new Set(['schema','claim','evident','assert','when','otherwise','with','as','then','else','find','all','some','one','none','minimizing','where','not','and','or','true','false','type']);
  const BUILTINS = new Set(['Prop','det','semidet','nondet','Nat','Int','Real','Bool','String','List','Maybe','Set','Type','Arrow','ForAll']);
  const WORD_OPS = new Set(['in','not_in','subset','superset','mapsto','bowtie','starts_with']);
  return {
    startState() { return { expectName: false, lineStart: false }; },
    copyState(s) { return { expectName: s.expectName, lineStart: s.lineStart }; },
    token(stream, state) {
      // Track whether the next non-whitespace token begins a line.
      if (stream.sol()) state.lineStart = true;
      if (stream.eatSpace()) return null;
      const atSol = state.lineStart;
      state.lineStart = false;

      // Line comment
      if (stream.match('--')) { stream.skipToEnd(); return 'comment'; }
      // String
      if (stream.peek() === '"') {
        stream.next();
        while (!stream.eol()) { const c = stream.next(); if (c === '\\') stream.next(); else if (c === '"') break; }
        return 'string';
      }
      // Query variable ?ident
      if (stream.match(/^\?[A-Za-z_][A-Za-z0-9_]*/)) return 'variableName';
      // Standalone ?
      if (stream.peek() === '?') { stream.next(); return 'operator'; }
      // Number
      if (stream.match(/^\d+(\.\d+)?/)) return 'number';
      // Unicode operators (longest first to avoid prefix conflicts)
      if (stream.match('∃!') || stream.match('¬∃')) return 'keyword';
      if (stream.match('=>') || stream.match('⇒') || stream.match('->') ||
          stream.match('<=') || stream.match('>=') || stream.match('!=')) return 'operator';
      if (stream.match('∀') || stream.match('∃') || stream.match('¬')) return 'keyword';
      if (stream.match('∈') || stream.match('∉') || stream.match('⊆') || stream.match('⊇') ||
          stream.match('∨') || stream.match('∧') || stream.match('≤') || stream.match('≥') ||
          stream.match('≠') || stream.match('×') || stream.match('·')) return 'operator';
      // ASCII operators
      if (stream.match(/^[|:=+\-*<>\\]/)) return 'operator';
      // Brackets / braces / parens
      if (stream.match(/^[\[\]{}()]/)) return 'bracket';
      // Dot(s) — .. is range/passthrough operator, single . is field access
      if (stream.peek() === '.') {
        if (stream.match('..')) return 'operator';
        stream.next();
        if (stream.match(/^[a-z_][A-Za-z0-9_]*/)) return 'propertyName';
        return null;
      }
      // Words
      const m = stream.match(/^[A-Za-z_][A-Za-z0-9_]*/);
      if (m) {
        const w = m[0];
        // Name following 'claim' or 'evident' is a definition
        if (state.expectName) { state.expectName = false; return 'labelName'; }
        if (KEYWORDS.has(w)) { state.expectName = w === 'claim' || w === 'evident'; return 'keyword'; }
        if (WORD_OPS.has(w)) return 'operatorKeyword';
        if (BUILTINS.has(w)) return 'typeName';
        if (/^[A-Z]/.test(w)) return 'typeName';
        // Field name: ident immediately before : or =
        if (stream.match(/^\s*[:=]/, false)) return 'propertyName';
        // Predicate name: first token on a line (top-level or indented body)
        if (atSol) return 'labelName';
        return 'variableName';
      }
      stream.next();
      return null;
    },
  };
})();

// ── SMT-LIB stream parser for CodeMirror ────────────────
// Token names must be @lezer/highlight tag property names (see _evidentParser).
const _smtParser = (() => {
  const W = (typeof window !== 'undefined' && window.SMT_WORDS) || {};
  const COMMANDS = new Set([...(W.commands || []), ...(W.binders || []), ...(W.logical || [])]);
  const BUILTINS = new Set(W.builtins || []);
  const SORTS = new Set(W.sorts || []);
  const LITERALS = new Set(W.literals || []);
  const SYM = /[A-Za-z0-9+\-/*=%?!.$_~&^<>@]/;       // any symbol char
  const SYM_START = /[A-Za-z+\-/*=%?!.$_~&^<>@]/;    // symbol char, not a digit
  const OP_ONLY = /^[+\-/*=%?!.$~&^<>@]+$/;          // purely punctuation symbol
  return {
    startState() { return {}; },
    copyState() { return {}; },
    token(stream) {
      if (stream.eatSpace()) return null;
      const ch = stream.peek();

      // Line comment
      if (ch === ';') { stream.skipToEnd(); return 'comment'; }
      // String literal — "" is the escaped double-quote
      if (ch === '"') {
        stream.next();
        while (!stream.eol()) {
          if (stream.next() === '"') {
            if (stream.peek() === '"') stream.next(); else break;
          }
        }
        return 'string';
      }
      // |quoted symbol|
      if (ch === '|') {
        stream.next();
        while (!stream.eol()) { if (stream.next() === '|') break; }
        return 'string';
      }
      // :attribute keyword
      if (ch === ':') { stream.next(); stream.eatWhile(SYM); return 'meta'; }
      // Hex / binary literals
      if (ch === '#') {
        stream.next();
        const t = stream.next();
        if (t === 'x') stream.eatWhile(/[0-9a-fA-F]/);
        else if (t === 'b') stream.eatWhile(/[01]/);
        return 'number';
      }
      // Numerals / decimals
      if (/[0-9]/.test(ch)) {
        stream.eatWhile(/[0-9]/);
        if (stream.peek() === '.') { stream.next(); stream.eatWhile(/[0-9]/); }
        return 'number';
      }
      // Parentheses
      if (ch === '(' || ch === ')') { stream.next(); return 'bracket'; }
      // Symbol token — classify by lookup
      if (SYM_START.test(ch)) {
        let w = '';
        while (!stream.eol() && SYM.test(stream.peek())) w += stream.next();
        if (COMMANDS.has(w)) return 'keyword';
        if (LITERALS.has(w)) return 'bool';
        if (SORTS.has(w)) return 'typeName';
        if (BUILTINS.has(w)) return 'operatorKeyword';
        if (/^[A-Z]/.test(w)) return 'typeName';   // user-declared sorts are capitalised by convention
        if (OP_ONLY.test(w)) return 'operator';
        return null;
      }
      stream.next();
      return null;
    },
  };
})();

// ── State ───────────────────────────────────────────────
const state = {
  currentPath: null,
  editorInstance: null,
  isEditing: false,
  mode: 'files',          // 'files' | 'sessions'
  sessionGroups: null,    // cached /api/sessions response
  currentSessionId: null,
  sessionRender: null,    // { turns, index, observer } for incremental rendering
};

// ── Extension → language map ────────────────────────────
const EXT_LANG_MAP = {
  go: 'go', py: 'python', js: 'javascript', ts: 'typescript',
  tsx: 'tsx', jsx: 'jsx', rs: 'rust', java: 'java',
  c: 'c', cpp: 'cpp', cc: 'cpp', h: 'c', hpp: 'cpp',
  sh: 'bash', bash: 'bash', zsh: 'bash',
  yaml: 'yaml', yml: 'yaml', json: 'json', toml: 'toml',
  html: 'html', css: 'css', scss: 'scss', sql: 'sql',
  rb: 'ruby', php: 'php', cs: 'csharp', kt: 'kotlin',
  swift: 'swift', r: 'r', scala: 'scala',
  ex: 'elixir', exs: 'elixir', lua: 'lua',
  xml: 'xml', dockerfile: 'dockerfile', makefile: 'makefile',
  tf: 'hcl', hcl: 'hcl', vim: 'vim', proto: 'protobuf',
  smt: 'smt', smt2: 'smt',
};

// Extension used to pick syntax highlighting. Jinja2 templates (e.g.
// foo.smt2.j2) are highlighted by their underlying file type.
function highlightExt(path) {
  const parts = path.toLowerCase().split('.');
  let ext = parts.pop();
  if (ext === 'j2' && parts.length > 1) ext = parts.pop();
  return ext;
}

// ── Boot ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (localStorage.getItem('fullWidth') === '1') document.getElementById('render-panel').classList.add('full-width');
  // Don't persist the boot theme: a stored value means the user manually chose
  // it, which is how the live OS-change listener tells override from default.
  applyTheme(preferredTheme(), false, false);

  await loadFileTree();
  connectSSE();

  // Priority: URL ?session= → URL ?file= → server initial file → nothing
  const params = new URLSearchParams(location.search);
  const urlSession = params.get('session');
  const urlFile = params.get('file');
  if (urlSession) {
    switchMode('sessions');
    openSession(urlSession, null, true);
  } else if (urlFile) {
    openFile(urlFile);
  } else {
    try {
      const cfg = await fetch('/api/config').then(r => r.json());
      if (cfg.initialFile) openFile(cfg.initialFile);
    } catch {}
  }
});

// Keep URL in sync when navigating via back/forward.
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(location.search);
  const session = params.get('session');
  const file = params.get('file');
  if (session) {
    if (state.mode !== 'sessions') switchMode('sessions');
    openSession(session, null, true);
  } else if (file) {
    openFile(file, true);
  }
});

// ── File Tree ────────────────────────────────────────────
async function loadFileTree() {
  try {
    const res = await fetch('/api/files');
    const nodes = await res.json();
    const container = document.getElementById('file-tree');

    // Snapshot which directories are currently open so we can restore that state
    // after re-rendering. Without this, every reload collapses the whole tree.
    const openDirs = new Set();
    container.querySelectorAll('.tree-dir-wrap.open').forEach(el => {
      if (el.dataset.path) openDirs.add(el.dataset.path);
    });

    container.innerHTML = '';
    if (!nodes || nodes.length === 0) {
      container.innerHTML = '<div style="padding:12px;color:var(--blockquote-fg);font-size:12px;">No files found</div>';
      return;
    }
    renderTreeNodes(nodes, container, openDirs);

    if (state.currentPath) setActiveTreeItem(state.currentPath);
  } catch (e) {
    console.error('loadFileTree error:', e);
  }
}

function renderTreeNodes(nodes, container, openDirs) {
  for (const node of nodes) {
    if (node.isDir) {
      const wrap = document.createElement('div');
      wrap.className = 'tree-dir-wrap';
      wrap.dataset.path = node.path;

      const label = document.createElement('div');
      label.className = 'tree-dir-label';
      label.textContent = node.name;

      const children = document.createElement('div');
      children.className = 'tree-dir-children';
      if (node.children && node.children.length > 0) {
        renderTreeNodes(node.children, children, openDirs);
      }

      label.onclick = () => {
        const isOpen = wrap.classList.toggle('open');
        label.classList.toggle('open', isOpen);
        children.classList.toggle('open', isOpen);
      };

      if (openDirs && openDirs.has(node.path)) {
        wrap.classList.add('open');
        label.classList.add('open');
        children.classList.add('open');
      }

      wrap.appendChild(label);
      wrap.appendChild(children);
      container.appendChild(wrap);
    } else {
      const el = document.createElement('div');
      el.className = 'tree-item tree-file';
      el.textContent = node.name;
      el.dataset.path = node.path;
      el.onclick = () => openFile(node.path);
      container.appendChild(el);
    }
  }
}

function setActiveTreeItem(path) {
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.tree-item[data-path="${CSS.escape(path)}"]`);
  if (el) {
    el.classList.add('active');
    // Auto-expand parent directories
    let parent = el.parentElement;
    while (parent && parent.id !== 'file-tree') {
      if (parent.classList.contains('tree-dir-children')) {
        parent.classList.add('open');
        const label = parent.previousElementSibling;
        if (label) label.classList.add('open');
        if (parent.parentElement && parent.parentElement.classList.contains('tree-dir-wrap')) {
          parent.parentElement.classList.add('open');
        }
      }
      parent = parent.parentElement;
    }
  }
}

// ── Open File ────────────────────────────────────────────
async function openFile(path, fromPopstate) {
  if (state.isEditing) {
    await exitEditMode(false);
  }
  // Leaving any open transcript: detach its scroll/key listeners and hide nav.
  if (state.sessionRender && state.sessionRender.destroy) {
    state.sessionRender.destroy();
    state.sessionRender = null;
  }
  state.currentSessionId = null;
  document.getElementById('session-nav').style.display = 'none';
  document.getElementById('session-find').style.display = 'none';
  if (window._resetFind) window._resetFind();
  state.currentPath = path;

  // Update URL so the link is copy-pasteable.
  if (!fromPopstate) {
    const target = '/?file=' + encodeURIComponent(path);
    if (location.href !== location.origin + target) {
      history.pushState(null, '', target);
    }
  }

  setActiveTreeItem(path);
  document.getElementById('current-file-name').textContent = path;
  document.getElementById('edit-btn').style.display = '';

  try {
    const res = await fetch('/api/file?path=' + encodeURIComponent(path));
    if (!res.ok) { console.error('fetch error', res.status); return; }
    const text = await res.text();
    await renderFile(path, text);
  } catch (e) {
    console.error('openFile error:', e);
  }
}

// ── Render ───────────────────────────────────────────────
async function renderFile(path, text) {
  const ext = highlightExt(path);
  const isMd = ext === 'md' || ext === 'markdown';
  const lang = EXT_LANG_MAP[ext] || ext;

  const mdSource = isMd ? text : ('```' + lang + '\n' + text + '\n```');

  const panel = document.getElementById('render-panel');
  // Save scroll as fraction of total height
  const scrollFraction = panel.scrollHeight > 0 ? panel.scrollTop / panel.scrollHeight : 0;

  // Wrap in a .doc block so the document centers as a whole (per-element
  // margins would otherwise pin each block to the left).
  panel.innerHTML = '';
  const doc = document.createElement('div');
  doc.className = 'doc';
  doc.innerHTML = marked.parse(mdSource);
  panel.appendChild(doc);

  await enhance(doc);

  // Restore scroll after mermaid (SVG expansion may change scrollHeight)
  panel.scrollTop = scrollFraction * panel.scrollHeight;

  renderPageTicks();
}

// Estimated height of one printed page: a US-Letter sheet at 96 CSS dpi
// (11in × 96 = 1056px). A rough, deliberately simple proxy for "where the
// page would break on paper" — margins and print reflow aren't modelled.
const PRINT_PAGE_PX = 1056;

// Draw tick marks down the right edge of the rendered document at each
// estimated print-page boundary. File view only — the transcript view is
// virtualised, so absolute offsets there are meaningless.
function renderPageTicks() {
  const panel = document.getElementById('render-panel');
  panel.querySelectorAll('.page-tick').forEach(el => el.remove());
  if (state.mode === 'sessions' || state.isEditing || !state.currentPath) return;

  const total = panel.scrollHeight;
  for (let y = PRINT_PAGE_PX, page = 1; y < total; y += PRINT_PAGE_PX, page++) {
    const tick = document.createElement('div');
    tick.className = 'page-tick';
    tick.style.top = y + 'px';
    tick.dataset.label = page + 1;  // the page that begins below this line
    panel.appendChild(tick);
  }
}

// Reflowing the document changes where pages fall, so recompute ticks.
document.getElementById('width-toggle').addEventListener('click', () => setTimeout(renderPageTicks, 0));
let _tickResizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_tickResizeTimer);
  _tickResizeTimer = setTimeout(renderPageTicks, 150);
});

// enhance applies syntax highlighting and renders mermaid diagrams within a
// container. It skips nodes already processed, so it's safe to call repeatedly
// on a growing container (incremental session rendering).
async function enhance(root) {
  root.querySelectorAll('pre code').forEach(el => {
    if (el.dataset.highlighted !== 'yes') hljs.highlightElement(el);
  });
  const mermaidNodes = root.querySelectorAll('div.mermaid:not([data-processed])');
  if (mermaidNodes.length > 0) {
    try {
      await mermaid.run({ nodes: mermaidNodes });
    } catch (e) {
      console.warn('mermaid render error:', e);
    }
  }
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── SSE Live Reload ──────────────────────────────────────
function connectSSE() {
  let es = new EventSource('/events');

  es.onmessage = async (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'ping') return;

    if (msg.type === 'session-reload') {
      if (msg.id === state.currentSessionId && !state.isEditing) reloadSession();
      return;
    }

    if (msg.type === 'reload') {
      // Always refresh file tree
      loadFileTree();
      // If changed file is currently open and we're not editing, re-render
      if (msg.path === state.currentPath && !state.isEditing) {
        try {
          const res = await fetch('/api/file?path=' + encodeURIComponent(state.currentPath));
          if (res.ok) {
            const text = await res.text();
            await renderFile(state.currentPath, text);
          }
        } catch {}
      }
    }
  };

  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── Edit Mode ────────────────────────────────────────────
document.getElementById('edit-btn').addEventListener('click', enterEditMode);

async function enterEditMode() {
  if (state.isEditing || !state.currentPath) return;

  // Wait for CodeMirror to load (dynamic import, resolves with the modules)
  const { EditorView, basicSetup, markdown, oneDark, languages, LanguageDescription,
          LanguageSupport, syntaxHighlighting, defaultHighlightStyle, StreamLanguage } = await window._cmPromise;

  const res = await fetch('/api/file?path=' + encodeURIComponent(state.currentPath));
  const text = await res.text();

  const renderPanel = document.getElementById('render-panel');
  const editorPanel = document.getElementById('editor-panel');
  renderPanel.style.display = 'none';
  editorPanel.style.display = 'flex';

  state.isEditing = true;

  // Destroy previous editor instance
  if (state.editorInstance) {
    state.editorInstance.destroy();
    state.editorInstance = null;
  }

  const isDark = document.documentElement.dataset.theme === 'dark';
  const ext = highlightExt(state.currentPath);
  const isMd = ext === 'md' || ext === 'markdown';

  // Pick language extension for this file type.
  let langExt;
  if (isMd) {
    // Markdown with syntax highlighting inside fenced code blocks.
    const evidentDesc = LanguageDescription.of({
      name: 'Evident',
      alias: ['ev'],
      load() { return Promise.resolve(new LanguageSupport(StreamLanguage.define(_evidentParser))); },
    });
    const smtDesc = LanguageDescription.of({
      name: 'SMT',
      alias: ['smt', 'smt2', 'smtlib', 'smt-lib'],
      extensions: ['smt', 'smt2'],
      load() { return Promise.resolve(new LanguageSupport(StreamLanguage.define(_smtParser))); },
    });
    langExt = markdown({ codeLanguages: [evidentDesc, smtDesc, ...languages] });
  } else if (ext === 'ev') {
    langExt = new LanguageSupport(StreamLanguage.define(_evidentParser));
  } else if (ext === 'smt' || ext === 'smt2') {
    langExt = new LanguageSupport(StreamLanguage.define(_smtParser));
  } else {
    const desc = LanguageDescription.matchFilename(languages, state.currentPath);
    if (desc) langExt = await desc.load();
  }

  const extensions = [basicSetup];
  if (langExt) extensions.push(langExt);
  // oneDark supplies its own highlight style; in light mode we explicitly add
  // the default style without {fallback:true} so it always fires.
  if (isDark) {
    extensions.push(oneDark);
  } else {
    extensions.push(syntaxHighlighting(defaultHighlightStyle));
  }

  state.editorInstance = new EditorView({
    doc: text,
    extensions,
    parent: editorPanel,
  });

  state.editorInstance.focus();

  // Save on focus leaving the editor container
  const blurHandler = async (e) => {
    if (!editorPanel.contains(e.relatedTarget)) {
      editorPanel.removeEventListener('focusout', blurHandler);
      await exitEditMode(true);
    }
  };
  editorPanel.addEventListener('focusout', blurHandler);
}

async function exitEditMode(save) {
  if (!state.isEditing) return;
  state.isEditing = false;

  if (save && state.editorInstance) {
    await saveFile();
  }

  const renderPanel = document.getElementById('render-panel');
  const editorPanel = document.getElementById('editor-panel');
  editorPanel.style.display = 'none';
  renderPanel.style.display = 'block';

  // Re-render with saved content
  if (state.currentPath) {
    try {
      const res = await fetch('/api/file?path=' + encodeURIComponent(state.currentPath));
      if (res.ok) {
        const text = await res.text();
        await renderFile(state.currentPath, text);
      }
    } catch {}
  }
}

async function saveFile() {
  if (!state.editorInstance || !state.currentPath) return;
  const content = state.editorInstance.state.doc.toString();
  try {
    await fetch('/api/file?path=' + encodeURIComponent(state.currentPath), {
      method: 'POST',
      body: content,
      headers: { 'Content-Type': 'text/plain; charset=utf-8' },
    });
  } catch (e) {
    console.error('saveFile error:', e);
  }
}

// ── Mode switching (Files / Sessions) ───────────────────
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});

function switchMode(mode) {
  if (mode === state.mode) return;
  state.mode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

  const filesView = mode === 'files';
  document.getElementById('file-tree').style.display = filesView ? '' : 'none';
  document.getElementById('session-list').style.display = filesView ? 'none' : 'block';

  const input = document.getElementById('search-input');
  input.value = '';
  input.placeholder = filesView ? 'Search files...' : 'Filter sessions...';
  document.getElementById('search-results').innerHTML = '';

  if (!filesView) loadSessions();
}

// ── Sessions list ───────────────────────────────────────
async function loadSessions() {
  const container = document.getElementById('session-list');
  if (state.sessionGroups) { renderSessionList(state.sessionGroups); return; }
  container.innerHTML = '<div style="padding:12px;color:var(--blockquote-fg);font-size:12px;">Loading sessions…</div>';
  try {
    const groups = await fetch('/api/sessions').then(r => r.json());
    state.sessionGroups = groups;
    renderSessionList(groups);
  } catch (e) {
    container.innerHTML = '<div style="padding:12px;color:var(--blockquote-fg);font-size:12px;">Could not load sessions.</div>';
    console.error('loadSessions error:', e);
  }
}

function renderSessionList(groups, filter) {
  const container = document.getElementById('session-list');
  container.innerHTML = '';
  if (!groups || groups.length === 0) {
    container.innerHTML = '<div style="padding:12px;color:var(--blockquote-fg);font-size:12px;">No sessions found.</div>';
    return;
  }
  const q = (filter || '').toLowerCase();
  let shown = 0;
  for (const g of groups) {
    const sessions = q
      ? g.sessions.filter(s => s.title.toLowerCase().includes(q) || g.project.toLowerCase().includes(q))
      : g.sessions;
    if (sessions.length === 0) continue;

    const groupEl = document.createElement('div');
    groupEl.className = 'session-group';
    const label = document.createElement('div');
    label.className = 'session-group-label';
    // Allow long paths to wrap at each path separator.
    label.innerHTML = escHtml(g.project).replace(/\//g, '/<wbr>');
    label.title = g.project;
    groupEl.appendChild(label);

    for (const s of sessions) {
      shown++;
      const item = document.createElement('div');
      item.className = 'session-item';
      item.dataset.id = s.id;
      if (s.id === state.currentSessionId) item.classList.add('active');
      const date = new Date(s.modUnix * 1000).toLocaleString();
      item.innerHTML =
        '<span class="session-title"></span>' +
        '<span class="session-meta">' + escHtml(date) + ' · ' + formatBytes(s.size) + '</span>';
      item.querySelector('.session-title').textContent = s.title;
      item.title = s.title;
      item.onclick = () => openSession(s.id, s.title);
      groupEl.appendChild(item);
    }
    container.appendChild(groupEl);
  }
  if (shown === 0) {
    container.innerHTML = '<div style="padding:12px;color:var(--blockquote-fg);font-size:12px;">No matching sessions.</div>';
  }
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

// ── Open + render a session transcript ───────────────────
async function openSession(id, title, fromPopstate) {
  if (state.isEditing) await exitEditMode(false);
  state.currentSessionId = id;

  // Keep the URL shareable / refresh-able.
  if (!fromPopstate) {
    const target = '/?session=' + encodeURIComponent(id);
    if (location.href !== location.origin + target) history.pushState(null, '', target);
  }

  document.querySelectorAll('.session-item.active').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.session-item[data-id="${CSS.escape(id)}"]`);
  if (item) item.classList.add('active');

  document.getElementById('current-file-name').textContent = title || id;
  document.getElementById('edit-btn').style.display = 'none';

  // Ask the server to live-watch this transcript for changes.
  fetch('/api/watch-session?id=' + encodeURIComponent(id)).catch(() => {});

  const panel = document.getElementById('render-panel');
  panel.innerHTML = '<div id="welcome"><p>Loading transcript…</p></div>';

  try {
    const data = await fetch('/api/session?id=' + encodeURIComponent(id)).then(r => r.json());
    // On refresh/back we have no title; fall back to the parsed one.
    if (!title && data.title) document.getElementById('current-file-name').textContent = data.title;
    renderSession(data);
  } catch (e) {
    panel.innerHTML = '<div id="welcome"><p>Could not load transcript.</p></div>';
    console.error('openSession error:', e);
  }
}

// Re-fetch and re-render the open transcript (triggered by a live file change).
// Keeps the reader pinned to the bottom if they were already there (watching a
// session grow), otherwise preserves their scroll position.
async function reloadSession() {
  const id = state.currentSessionId;
  const win = state.sessionRender;
  if (!id) return;
  const panel = document.getElementById('render-panel');
  const atEnd = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 120;
  // Anchor on the turn we're currently reading (a stable index), NOT a scroll
  // fraction — the fraction maps differently depending on which pages are
  // mounted, which is what made the scroll jump on every reload.
  const topTurn = win && win.topVisibleTurn ? win.topVisibleTurn() : 0;
  try {
    const data = await fetch('/api/session?id=' + encodeURIComponent(id)).then(r => r.json());
    if (state.currentSessionId !== id) return; // user navigated away mid-fetch
    renderSession(data, { atEnd, turn: topTurn });
  } catch (e) {
    console.error('reloadSession error:', e);
  }
}

// ── Transcript find bar wiring ───────────────────────────
(function () {
  const input = document.getElementById('find-input');
  const count = document.getElementById('find-count');
  let timer = null;
  const win = () => state.sessionRender;

  function updateCount() {
    const w = win();
    if (!w || !w.searchInfo || !input.value.trim()) { count.textContent = ''; return; }
    const { count: n, index } = w.searchInfo();
    count.textContent = n === 0 ? 'no results' : (index >= 0 ? index + 1 : '–') + ' / ' + n;
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const w = win();
      if (!w || !w.setSearch) return;
      const q = input.value.trim();
      const n = w.setSearch(q);
      if (q && n > 0) w.gotoMatch(0);
      updateCount();
    }, 200);
  });
  input.addEventListener('keydown', (e) => {
    const w = win();
    if (e.key === 'Enter') {
      e.preventDefault();
      if (w) { e.shiftKey ? w.prevMatch() : w.nextMatch(); updateCount(); }
    } else if (e.key === 'Escape') {
      e.preventDefault();
      input.value = '';
      if (w && w.setSearch) w.setSearch('');
      updateCount();
      input.blur();
    }
  });
  document.getElementById('find-next').addEventListener('click', () => { const w = win(); if (w) { w.nextMatch(); updateCount(); } input.focus(); });
  document.getElementById('find-prev').addEventListener('click', () => { const w = win(); if (w) { w.prevMatch(); updateCount(); } input.focus(); });

  // ⌘F / Ctrl+F focuses the find bar instead of the browser's (useless here,
  // since only a few pages are mounted) when a transcript is open.
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'f' &&
        state.mode === 'sessions' && state.currentSessionId) {
      e.preventDefault();
      input.focus();
      input.select();
    }
  });

  window._resetFind = () => { input.value = ''; count.textContent = ''; };
})();

// ── Sidebar resize (drag the handle on its right edge) ───
(function () {
  const sidebar = document.getElementById('sidebar');
  const handle = document.getElementById('sidebar-resizer');
  const MIN = 140, MAX = 640;
  const saved = parseInt(localStorage.getItem('sidebarWidth'), 10);
  if (saved >= MIN && saved <= MAX) sidebar.style.width = saved + 'px';

  let startX = 0, startW = 0, dragging = false;
  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    sidebar.style.width = Math.max(MIN, Math.min(MAX, startW + (e.clientX - startX))) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
    localStorage.setItem('sidebarWidth', Math.round(sidebar.getBoundingClientRect().width));
    renderPageTicks(); // panel width changed → page breaks moved
  });
})();

const PAGE_SIZE = 20;     // turns per page
const WINDOW_PAGES = 3;   // pages kept mounted at once (prev / current / next)

function renderSession(data, restore) {
  const panel = document.getElementById('render-panel');

  // Tear down any previous window (scroll/key listeners).
  if (state.sessionRender && state.sessionRender.destroy) state.sessionRender.destroy();
  panel.innerHTML = '';

  const nav = document.getElementById('session-nav');
  const find = document.getElementById('session-find');
  if (window._resetFind) window._resetFind();
  if (!data.turns || data.turns.length === 0) {
    panel.innerHTML = '<div id="welcome"><p>No prose in this session.</p></div>';
    nav.style.display = 'none';
    find.style.display = 'none';
    state.sessionRender = null;
    return;
  }
  nav.style.display = '';
  find.style.display = '';
  const win = createSessionWindow(panel, data.turns);
  state.sessionRender = win;

  // Restore reading position after a live reload; on a fresh open, jump to the
  // bottom (the latest messages are what you usually want).
  if (restore) {
    if (restore.atEnd) win.jumpEnd();
    else if (restore.turn != null) win.scrollToTurn(restore.turn);
  } else {
    win.jumpEnd();
  }
}

// createSessionWindow renders a transcript as a sliding window of WINDOW_PAGES
// pages. Un-mounted pages are represented by top/bottom spacer elements whose
// heights come from a FIXED, text-length-based estimate computed once up front.
// Keeping the estimate fixed (rather than re-deriving it from measured DOM) is
// what makes the scrollbar stable: measuring a short page can't collapse the
// total height and send a scrollbar drag cascading to the end. Viewport
// stability across mounts/unmounts comes from anchoring on a surviving page's
// on-screen position. The live DOM stays bounded to ~WINDOW_PAGES*PAGE_SIZE turns.
function createSessionWindow(panel, turns) {
  const pageCount = Math.ceil(turns.length / PAGE_SIZE);
  let winStart = 0, winEnd = -1;
  let query = '';      // active find query (lower-cased)
  let matches = [];    // turn indices containing the query
  let matchIdx = -1;   // current position within matches

  const pageStart = p => p * PAGE_SIZE;
  const pageEnd   = p => Math.min((p + 1) * PAGE_SIZE, turns.length); // exclusive

  // Fixed per-page height estimate from text length (cheap, computed once).
  // ~95 chars/line, ~22px/line, plus per-turn chrome; never mutated afterwards.
  const estPage = new Array(pageCount);
  for (let p = 0; p < pageCount; p++) {
    let h = 0;
    for (let i = pageStart(p); i < pageEnd(p); i++) {
      const turn = turns[i];
      if (turn.role === 'tool') { h += 20; continue; } // one compact line
      const t = turn.text || '';
      const lines = t.split('\n').length + Math.floor(t.length / 95);
      h += Math.max(1, lines) * 22 + (turn.role === 'user' ? 60 : 40);
    }
    estPage[p] = h;
  }
  const heightOf = p => estPage[p];
  const topH = () => parseFloat(topSpacer.style.height) || 0;

  const topSpacer = document.createElement('div'); topSpacer.id = 'turn-top-spacer';
  const botSpacer = document.createElement('div'); botSpacer.id = 'turn-bottom-spacer';
  panel.appendChild(topSpacer);
  panel.appendChild(botSpacer);

  function recomputeSpacers() {
    let top = 0; for (let p = 0; p < winStart; p++) top += heightOf(p);
    let bot = 0; for (let p = winEnd + 1; p < pageCount; p++) bot += heightOf(p);
    topSpacer.style.height = top + 'px';
    botSpacer.style.height = bot + 'px';
  }
  function buildPage(p) {
    const el = document.createElement('div');
    el.className = 'turn-page';
    el.dataset.page = p;
    for (let i = pageStart(p); i < pageEnd(p); i++) el.appendChild(buildTurn(turns[i], i, query));
    return el;
  }
  function pages() { return panel.querySelectorAll('.turn-page'); }
  // Map a scroll offset to the page occupying that y position (estimate-based).
  function pageAtY(y) {
    let acc = 0;
    for (let p = 0; p < pageCount; p++) { const h = heightOf(p); if (y < acc + h) return p; acc += h; }
    return pageCount - 1;
  }

  // Mount a fresh window [start,end] (first render and big jumps).
  function setWindow(start, end) {
    start = Math.max(0, start);
    end = Math.min(pageCount - 1, end);
    pages().forEach(el => el.remove());
    const frag = document.createDocumentFragment();
    for (let p = start; p <= end; p++) frag.appendChild(buildPage(p));
    panel.insertBefore(frag, botSpacer);
    winStart = start; winEnd = end;
    enhance(panel);
    recomputeSpacers();
  }

  // Mount one more page at an edge, dropping the far edge to stay within
  // WINDOW_PAGES. We anchor on a surviving page's screen position and correct
  // scrollTop by its shift, so the viewport never jumps.
  function shiftDown() {
    const anchor = panel.querySelector(`.turn-page[data-page="${winEnd}"]`);
    const before = anchor.getBoundingClientRect().top;
    const el = buildPage(winEnd + 1);
    panel.insertBefore(el, botSpacer);
    enhance(el); winEnd++;
    while (winEnd - winStart + 1 > WINDOW_PAGES) { panel.querySelector('.turn-page').remove(); winStart++; }
    recomputeSpacers();
    panel.scrollTop += anchor.getBoundingClientRect().top - before;
  }
  function shiftUp() {
    const anchor = panel.querySelector(`.turn-page[data-page="${winStart}"]`);
    const before = anchor.getBoundingClientRect().top;
    const el = buildPage(winStart - 1);
    panel.insertBefore(el, panel.querySelector('.turn-page'));
    enhance(el); winStart--;
    while (winEnd - winStart + 1 > WINDOW_PAGES) {
      const all = panel.querySelectorAll('.turn-page');
      all[all.length - 1].remove(); winEnd--;
    }
    recomputeSpacers();
    panel.scrollTop += anchor.getBoundingClientRect().top - before;
  }

  function updatePos() {
    const p = pageAtY(panel.scrollTop + panel.clientHeight / 2);
    document.getElementById('sess-pos').textContent =
      'msgs ' + (pageStart(p) + 1) + '–' + pageEnd(p) + ' of ' + turns.length;
  }

  function adjust() {
    const st = panel.scrollTop, vh = panel.clientHeight;
    const centerY = st + vh / 2;
    // Decide using the REAL mounted geometry, not the estimate. The mounted
    // pages occupy [topH(), botSpacer.offsetTop) in scroll coordinates.
    // If the viewport centre is inside a spacer (e.g. a scrollbar drag landed
    // far from the mounted window), re-center the window from the estimate and
    // snap to its top. If it's within mounted content (normal scrolling, or a
    // programmatic scrollIntoView), only prefetch at the edges — never jump,
    // so estimate/real mismatches can't yank the viewport.
    const mountedTop = topH();
    const mountedBot = botSpacer.offsetTop;
    if (centerY < mountedTop || centerY > mountedBot) {
      const center = pageAtY(centerY);
      if (center < winStart || center > winEnd) {
        setWindow(center - 1, center + 1);
        panel.scrollTop = topH();
        updatePos();
        return;
      }
    }
    let guard = 0;
    while (guard++ < WINDOW_PAGES + 1) {
      if (winEnd < pageCount - 1 && st + vh * 2 >= botSpacer.offsetTop) { shiftDown(); continue; }
      if (winStart > 0 && st <= topH() + vh) { shiftUp(); continue; }
      break;
    }
  }

  let ticking = false;
  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => { ticking = false; adjust(); updatePos(); });
  }
  function onKey(e) {
    if (state.mode !== 'sessions' || state.isEditing) return;
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.key === 'Home') { e.preventDefault(); jumpTop(); }
    else if (e.key === 'End') { e.preventDefault(); jumpEnd(); }
  }

  function jumpTop() { setWindow(0, WINDOW_PAGES - 1); panel.scrollTop = 0; updatePos(); }
  function jumpEnd() { setWindow(pageCount - WINDOW_PAGES, pageCount - 1); panel.scrollTop = panel.scrollHeight; updatePos(); }

  const topBtn = document.getElementById('sess-top');
  const endBtn = document.getElementById('sess-end');
  topBtn.onclick = jumpTop;
  endBtn.onclick = jumpEnd;
  panel.addEventListener('scroll', onScroll);
  document.addEventListener('keydown', onKey);

  // Initial render.
  setWindow(0, WINDOW_PAGES - 1);
  panel.scrollTop = 0;
  updatePos();

  // Position the viewport at a fraction of the whole transcript, then let
  // adjust() mount the right window for that offset.
  function scrollToFrac(frac) {
    panel.scrollTop = Math.round((panel.scrollHeight - panel.clientHeight) * frac);
    adjust();
    updatePos();
  }

  // The index of the topmost turn currently in view — a stable anchor to
  // preserve reading position across a re-render (e.g. a live reload), since
  // turn indices don't shift when content is only appended.
  function topVisibleTurn() {
    const top = panel.getBoundingClientRect().top;
    for (const el of panel.querySelectorAll('.turn')) {
      if (el.getBoundingClientRect().bottom > top + 1) return +el.dataset.turn;
    }
    return winStart * PAGE_SIZE;
  }
  // Mount the page holding a turn and align that turn to the top (or centre).
  function scrollToTurn(turnIdx, center) {
    const page = Math.floor(turnIdx / PAGE_SIZE);
    setWindow(page - 1, page + 1);
    const el = panel.querySelector(`.turn[data-turn="${turnIdx}"]`);
    if (el) el.scrollIntoView({ block: center ? 'center' : 'start' });
    updatePos();
  }

  // ── In-transcript search ──────────────────────────────
  // Search runs over the full turns array (all in memory), independent of which
  // pages happen to be mounted. setSearch returns the number of matching turns.
  function setSearch(q) {
    query = (q || '').toLowerCase();
    matches = [];
    if (query) {
      for (let i = 0; i < turns.length; i++) {
        const tn = turns[i];
        const hay = tn.role === 'tool'
          ? ((tn.name || '') + ' ' + (tn.query || '') + ' ' + (tn.result || ''))
          : (tn.text || '');
        if (hay.toLowerCase().includes(query)) matches.push(i);
      }
    }
    matchIdx = -1;
    setWindow(winStart, winEnd); // re-render mounted pages to apply/clear marks
    return matches.length;
  }
  // Jump to match number i (wraps around), mounting its page and scrolling the
  // turn into view with its hits flagged active.
  function gotoMatch(i) {
    if (!matches.length) return;
    matchIdx = ((i % matches.length) + matches.length) % matches.length;
    const turnIdx = matches[matchIdx];
    const page = Math.floor(turnIdx / PAGE_SIZE);
    setWindow(page - 1, page + 1);
    const turnEl = panel.querySelector(`.turn[data-turn="${turnIdx}"]`);
    if (turnEl) {
      const hits = turnEl.querySelectorAll('mark.search-hit');
      hits.forEach(m => m.classList.add('search-hit-active'));
      // Scroll the matched text itself into view (not the whole turn, which can
      // be taller than the viewport). Fall back to the turn if the match was in
      // a code span whose <mark> was dropped by syntax highlighting. We do NOT
      // call adjust() here — its estimate-based recentering would fight this.
      (hits[0] || turnEl).scrollIntoView({ block: 'center' });
    }
    updatePos();
  }
  function searchInfo() {
    return { count: matches.length, index: matchIdx, query };
  }

  return {
    jumpEnd,
    scrollToFrac,
    topVisibleTurn,
    scrollToTurn,
    setSearch,
    gotoMatch,
    nextMatch: () => gotoMatch(matchIdx + 1),
    prevMatch: () => gotoMatch(matchIdx - 1),
    searchInfo,
    destroy() {
      panel.removeEventListener('scroll', onScroll);
      document.removeEventListener('keydown', onKey);
      topBtn.onclick = null;
      endBtn.onclick = null;
    },
  };
}

function buildTurn(turn, index, query) {
  // Compact one-line tool call: name + input on the left, result on the right.
  if (turn.role === 'tool') {
    const el = document.createElement('div');
    el.className = 'turn turn-tool' + (turn.sidechain ? ' turn-sidechain' : '');
    if (index != null) el.dataset.turn = index;
    const call = document.createElement('span');
    call.className = 'tool-call';
    const nm = document.createElement('span');
    nm.className = 'tool-name';
    nm.textContent = '▸ ' + (turn.name || 'tool');
    call.appendChild(nm);
    if (turn.query) {
      const q = document.createElement('span');
      q.className = 'tool-query';
      q.textContent = ' ' + turn.query;
      call.appendChild(q);
    }
    call.title = (turn.name || '') + (turn.query ? ' ' + turn.query : '');
    const res = document.createElement('span');
    res.className = 'tool-result';
    res.textContent = turn.result || '';
    res.title = turn.result || '';
    if (query) { highlightMatches(call, query); highlightMatches(res, query); }
    el.appendChild(call);
    el.appendChild(res);
    return el;
  }

  const el = document.createElement('div');
  el.className = 'turn turn-' + turn.role +
    (turn.sidechain ? ' turn-sidechain' : '') +
    (turn.compact ? ' turn-compact' : '');
  if (index != null) el.dataset.turn = index;
  const role = document.createElement('div');
  role.className = 'turn-role';
  role.textContent = turn.compact ? 'Compaction summary' : (turn.role === 'user' ? 'You' : 'Claude');
  const body = document.createElement('div');
  body.className = 'turn-body';
  // Both roles render as markdown; the box around user turns provides the
  // visual separation. `breaks: true` keeps the line breaks people type into
  // prompts, while still formatting markdown (e.g. injected compaction summaries).
  body.innerHTML = turn.role === 'assistant'
    ? marked.parse(turn.text)
    : marked.parse(turn.text, { breaks: true });
  if (query) highlightMatches(body, query);
  el.appendChild(role);
  el.appendChild(body);
  return el;
}

// Wrap every occurrence of `query` (already lower-cased) in <mark>, walking
// text nodes only so the rendered markup stays intact. Code spans re-tokenised
// later by highlight.js may drop their marks, but prose matches persist.
function highlightMatches(root, query) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      return n.nodeValue && n.nodeValue.toLowerCase().includes(query)
        ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    },
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    const text = node.nodeValue, lower = text.toLowerCase();
    const frag = document.createDocumentFragment();
    let i = 0, from = 0;
    while ((i = lower.indexOf(query, from)) !== -1) {
      if (i > from) frag.appendChild(document.createTextNode(text.slice(from, i)));
      const mark = document.createElement('mark');
      mark.className = 'search-hit';
      mark.textContent = text.slice(i, i + query.length);
      frag.appendChild(mark);
      from = i + query.length;
    }
    if (from < text.length) frag.appendChild(document.createTextNode(text.slice(from)));
    node.parentNode.replaceChild(frag, node);
  }
}

// ── Search ───────────────────────────────────────────────
let searchTimer = null;

document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();

  // In Sessions mode the box filters the loaded session list client-side.
  if (state.mode === 'sessions') {
    renderSessionList(state.sessionGroups || [], q);
    return;
  }

  if (q.length < 2) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  searchTimer = setTimeout(() => runSearch(q), 300);
});

document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    e.target.value = '';
    document.getElementById('search-results').innerHTML = '';
  }
});

async function runSearch(q) {
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
    const results = await res.json();
    const container = document.getElementById('search-results');
    container.innerHTML = '';

    if (!results || results.length === 0) {
      container.innerHTML = '<div style="padding:6px;font-size:12px;color:var(--blockquote-fg);">No results</div>';
      return;
    }

    for (const r of results) {
      const el = document.createElement('div');
      el.className = 'search-result';
      el.innerHTML =
        '<span class="sr-file">' + escHtml(r.file) + ':' + r.line + '</span>' +
        '<span class="sr-snippet">' + escHtml(r.snippet) + '</span>';
      el.onclick = () => {
        openFile(r.file);
        document.getElementById('search-input').value = '';
        container.innerHTML = '';
      };
      container.appendChild(el);
    }

    if (results.length >= 200) {
      const note = document.createElement('div');
      note.style.cssText = 'padding:4px 6px;font-size:11px;color:var(--blockquote-fg);';
      note.textContent = 'Results capped at 200';
      container.appendChild(note);
    }
  } catch (e) {
    console.error('search error:', e);
  }
}

// ── Theme Toggle ─────────────────────────────────────────
document.getElementById('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.dataset.theme || 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark', true);
});

// The theme to use when the user hasn't explicitly chosen one: follow the OS.
// (Each server runs on a fresh random port, so localStorage rarely survives a
// restart — making the OS preference the effective default every launch.)
function preferredTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || saved === 'light') return saved;
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

// Follow live OS appearance changes, unless the user manually picked a theme.
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light', true, false);
  });
}

function applyTheme(theme, rerender, persist = true) {
  document.documentElement.dataset.theme = theme;
  if (persist) localStorage.setItem('theme', theme);

  const link = document.getElementById('hljs-theme');
  link.href = theme === 'dark'
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';

  document.getElementById('theme-toggle').textContent = theme === 'dark' ? 'Light' : 'Dark';

  mermaid.initialize({
    startOnLoad: false,
    theme: theme === 'dark' ? 'dark' : 'default',
    securityLevel: 'loose',
  });

  if (rerender && state.currentPath && !state.isEditing) {
    fetch('/api/file?path=' + encodeURIComponent(state.currentPath))
      .then(r => r.text())
      .then(text => renderFile(state.currentPath, text))
      .catch(() => {});
  }
}

// Initialize mermaid on first load
mermaid.initialize({
  startOnLoad: false,
  theme: preferredTheme() === 'dark' ? 'dark' : 'default',
  securityLevel: 'loose',
});

// Configure marked renderer once.
// `return false` in v12 silently drops the token rather than falling through,
// so we render code blocks explicitly to give hljs a proper element.
// marked.use renderer functions receive old positional args (code, lang, escaped),
// NOT a token object — despite what v12 docs suggest.
marked.use({
  renderer: {
    // Escape HTML tokens (inline and block) as literal text instead of
    // omitting or passing them through. This prevents tags like <title>
    // from being injected into innerHTML where the browser would interpret
    // them structurally (e.g. <title> swallows all subsequent content).
    html(token) {
      const text = typeof token === 'object' ? token.text : token;
      return escHtml(text);
    },
    code(code, lang) {
      if (lang === 'mermaid') {
        const id = 'mermaid-' + Math.random().toString(36).slice(2);
        return '<div class="mermaid" id="' + id + '">' + escHtml(code.replace(/\\n/g, '\n')) + '</div>';
      }
      const langAttr = lang ? ' class="language-' + escHtml(lang) + '"' : '';
      return '<pre><code' + langAttr + '>' + escHtml(code) + '</code></pre>\n';
    }
  }
});
</script>
</body>
